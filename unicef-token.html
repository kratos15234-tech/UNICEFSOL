<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>$UNICEF — Charity Token</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#00AEEF;--blue2:#0072CE;--text:rgba(255,255,255,0.68)}

/* Blocage structurel profond */
html, body {
  height: 100%;
  width: 100%;
  overscroll-behavior: none; /* Bloque le rebond mobile/trackpad */
}

body {
  font-family:'Outfit',sans-serif;
  color:#fff;
  overflow-x:hidden;
  background:url('bg.png') center center/cover fixed;
}

body::before{content:'';position:fixed;inset:0;z-index:0;background:rgba(4,7,14,0.58);pointer-events:none}

#particles{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.35}
#prog{position:fixed;top:0;left:0;height:2px;width:0%;background:linear-gradient(90deg,#0072CE,#00AEEF,#5ee8ff);z-index:9000;pointer-events:none}

/* ══ PIN ══ */
#pin-wrap{position:relative;height:400vh; overflow: clip;} /* Clip empêche tout dépassement visuel */
#pin-scene{position:sticky;top:0;width:100%;height:100vh;overflow:hidden}

/* ══ SUPER LAYERS ══ */
#backsuper,#frontsuper{
  position:absolute;inset:0;
  background-position:center bottom;
  background-size:contain;
  background-repeat:no-repeat;
  pointer-events:none;
  will-change:transform,opacity;
}
#backsuper{z-index:1;background-image:url('backsuper.png')}
#frontsuper{z-index:3;background-image:url('frontsuper.png')}

/* ══ GLOW ══ */
.hero-glow{
  position:absolute;top:5%;left:50%;transform:translateX(-50%);
  width:800px;height:800px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,174,239,0.1) 0%,transparent 68%);
  z-index:2;pointer-events:none;
  animation:gpulse 5s ease-in-out infinite;
}
@keyframes gpulse{0%,100%{opacity:.4;transform:translateX(-50%) scale(1)}50%{opacity:.85;transform:translateX(-50%) scale(1.1)}}

/* ══ HERO TITLE ══ */
#hero-title{
  position:absolute;z-index:4;
  top:35%;left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  will-change:transform,opacity;
}
.hero-word{
  display:block;font-family:'Bebas Neue',sans-serif;
  font-size:clamp(5rem,13vw,10rem);line-height:.9;letter-spacing:.04em;
  opacity:0;transform:translateY(80px);
}
.hero-word.blue{color:var(--blue)}
.hero-sub{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(1.3rem,2.6vw,2.1rem);
  letter-spacing:.12em;color:rgba(255,255,255,0.32);
  opacity:0;transform:translateY(20px);margin-top:.7rem;
}

/* ══ MISSION ══ */
#mission-content{
  position:absolute;z-index:5;inset:0;
  opacity:0;will-change:opacity,transform;
  transform:translateY(40px);
}
.m-watermark{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-58%);
  font-family:'Bebas Neue',sans-serif;font-size:clamp(18rem,40vw,36rem);
  line-height:1;letter-spacing:-.02em;color:transparent;
  -webkit-text-stroke:1px rgba(0,174,239,0.18);
  pointer-events:none;user-select:none;white-space:nowrap;
}
.m-fg{
  position:absolute;bottom:32vh;left:0;right:0;padding:0 7vw;
  display:flex;align-items:flex-end;justify-content:space-between;gap:3rem;
}
.m-stat{flex-shrink:0}
.m-pct{
  font-family:'Bebas Neue',sans-serif;font-size:clamp(4rem,9vw,8rem);
  line-height:.85;color:var(--blue);text-shadow:0 0 80px rgba(0,174,239,0.35);letter-spacing:-.01em;
}
.m-pct-label{font-size:.6rem;text-transform:uppercase;letter-spacing:.2em;color:rgba(255,255,255,0.32);margin-top:.5rem;}
.m-vl{
  width:1px;align-self:stretch;flex-shrink:0;
  background:linear-gradient(to bottom,transparent,rgba(0,174,239,0.35) 20%,rgba(0,174,239,0.35) 80%,transparent);
  min-height:120px;
}
.m-text{flex:1;max-width:520px}
.m-heading{
  font-family:'Bebas Neue',sans-serif;font-size:clamp(2.4rem,4.5vw,4rem);
  line-height:.92;letter-spacing:.03em;margin-bottom:1rem;
}
.m-heading .blue{color:var(--blue)}
.m-body{font-size:.92rem;color:var(--text);line-height:1.8;margin-bottom:1.6rem;max-width:420px;}
.m-btns{display:flex;gap:.85rem;flex-wrap:wrap}

.btn-p{
  display:inline-flex;align-items:center;gap:.5rem;background:var(--blue);color:#050810;
  font-weight:700;font-size:.8rem;padding:.78rem 1.7rem;border-radius:2px;
  text-decoration:none;letter-spacing:.08em;text-transform:uppercase;
  transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;
}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,174,239,0.45)}
.btn-g{
  display:inline-flex;align-items:center;gap:.5rem;border:1px solid rgba(255,255,255,0.15);
  color:rgba(255,255,255,0.65);font-size:.8rem;padding:.78rem 1.7rem;border-radius:2px;
  text-decoration:none;letter-spacing:.08em;text-transform:uppercase;
  transition:all .2s;backdrop-filter:blur(6px);
}
.btn-g:hover{border-color:rgba(255,255,255,0.45);color:#fff;transform:translateY(-2px)}

/* ══ QUOTE LAYER ══ */
#quote-layer{
  position:absolute;z-index:6;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
  clip-path:inset(100% 0 0 0);will-change:clip-path;padding:0 6vw 18vh;
}
#quote-layer::before{content:'';position:absolute;inset:0;background:rgba(4,7,14,0.38);pointer-events:none;}
.q-line-top{width:1px;height:50px;margin:0 auto 2.5rem;background:linear-gradient(to bottom,transparent,rgba(0,174,239,0.4));position:relative;z-index:1;}
.q-eyebrow{font-size:.58rem;text-transform:uppercase;letter-spacing:.28em;color:rgba(0,174,239,0.5);position:relative;z-index:1;margin-bottom:2.5rem;}
.q-main{
  font-family:'Bebas Neue',sans-serif;font-size:clamp(4rem,8vw,7rem);line-height:.95;letter-spacing:.02em;
  max-width:1050px;color:#fff;position:relative;z-index:1;text-shadow:0 2px 60px rgba(0,0,0,0.5);
}
.q-main .hl{color:var(--blue);text-shadow:0 0 80px rgba(0,174,239,0.35);}
.q-author{font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,0.25);margin-top:3rem;position:relative;z-index:1;}

@media(max-width:768px){
  .m-fg{flex-direction:column;align-items:flex-start;gap:1.5rem;padding:0 2rem;bottom:28vh}
  .m-vl{display:none}
  .m-watermark{font-size:55vw}
  .q-main{font-size:clamp(2.8rem,10vw,5rem)}
}
</style>
</head>
<body>

<canvas id="particles"></canvas>
<div id="prog"></div>

<div id="pin-wrap">
  <div id="pin-scene">
    <div class="hero-glow"></div>
    <div id="backsuper"></div>
    <div id="frontsuper"></div>

    <div id="hero-title">
      <span class="hero-word" id="w1">EVERY</span>
      <span class="hero-word blue" id="w2">TRADE</span>
      <span class="hero-word" id="w3">SAVES</span>
      <div class="hero-sub" id="heroSub">children around the world</div>
    </div>

    <div id="mission-content">
      <div class="m-watermark" id="mwm">100%</div>
      <div class="m-fg">
        <div class="m-stat" id="mstat">
          <div class="m-pct" id="mpct">100%</div>
          <div class="m-pct-label">of all fees to UNICEF</div>
        </div>
        <div class="m-vl" id="mvl"></div>
        <div class="m-text" id="mtxt">
          <div class="m-heading">CRYPTO WITH<br>A <span class="blue">REAL PURPOSE</span></div>
          <div class="m-btns">
            <a href="https://pump.fun" class="btn-p">Buy $UNICEF</a>
            <a href="https://unicef.org" class="btn-g">UNICEF.org →</a>
          </div>
        </div>
      </div>
    </div>

    <div id="quote-layer">
      <div class="q-line-top"></div>
      <div class="q-eyebrow">The $UNICEF Philosophy</div>
      <div class="q-main">"For the first time, trading crypto can <span class="hl">literally save a life."</span></div>
      <div class="q-author">$UNICEF · 100% fees to UNICEF · Built on Solana</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script>
gsap.registerPlugin(ScrollTrigger);

/* PARTICLES */
const cv=document.getElementById('particles'),cx=cv.getContext('2d');
let W,H,pts=[];
function rsz(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight}
rsz();window.addEventListener('resize',rsz);
for(let i=0;i<70;i++)pts.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+.2,vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,a:Math.random()*Math.PI*2});
(function loop(){
  cx.clearRect(0,0,W,H);
  pts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.a+=.003;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);
    cx.fillStyle=`rgba(0,174,239,${.16+Math.sin(p.a)*.09})`;cx.fill();
  });
  requestAnimationFrame(loop);
})();

/* BLOCAGE DE SCROLL ULTIME */
function hardLimit() {
  const scrollY = window.scrollY;
  const maxScroll = document.documentElement.scrollHeight - window.innerHeight;

  if (scrollY < 0) {
    window.scrollTo(0, 0);
  } else if (scrollY > maxScroll) {
    window.scrollTo(0, maxScroll);
  }
  
  // Barre de progression
  document.getElementById('prog').style.width = (scrollY / maxScroll * 100) + '%';
}

// On écoute le scroll et le touch pour mobile
window.addEventListener('scroll', hardLimit, { passive: false });
window.addEventListener('touchmove', hardLimit, { passive: false });

/* GSAP ANIMATIONS */
gsap.to(['#w1','#w2','#w3'],{y:0,opacity:1,duration:1.2,ease:'expo.out',stagger:.14,delay:.25});
gsap.to('#heroSub',{y:0,opacity:1,duration:1,ease:'expo.out',delay:.88});

const tl=gsap.timeline({
  scrollTrigger:{trigger:'#pin-wrap',start:'top top',end:'bottom bottom',scrub:1.5}
});

tl.to('#frontsuper', {y:'110vh',opacity:0,duration:.25}, 0);
tl.to('#hero-title', {y:'-50vh',opacity:0,duration:.22}, 0);
tl.to('#mission-content',{opacity:1,y:0,duration:.25}, 0.05);

tl.to('#backsuper', {y:'110vh',opacity:0,duration:.26}, 0.62);
tl.to('#mission-content', {opacity:0,y:'-50px',duration:.2}, 0.62);
tl.to('#quote-layer', {clipPath:'inset(0% 0 0 0)',duration:.28}, 0.63);

/* Counter */
let counted=false;
ScrollTrigger.create({
  trigger:'#pin-wrap',start:'22% center',
  onEnter:()=>{
    if(counted)return;counted=true;
    let o={v:0};
    gsap.to(o,{v:100,duration:1.8,ease:'expo.out',
      onUpdate:()=>{
        const v=Math.round(o.v)+'%';
        document.getElementById('mpct').textContent=v;
        document.getElementById('mwm').textContent=v;
      }
    });
  }
});
</script>
</body>
</html>
