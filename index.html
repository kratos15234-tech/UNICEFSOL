      border-radius: 16px;
      padding: 20px;

    #pin-scene { position: sticky; top: 0; height: 100vh; overflow: hidden; }

    /* ── SUPERS ── */
    #backsuper, #frontsuper {

      left: 0;
      right: 0;
      bottom: -1px;
      top: 0;
      background-repeat: no-repeat;
      mix-blend-mode: screen;
      pointer-events: none;
      will-change: transform;
    }
    
    #backsuper { 
      background-image: url('backsuper.png'); 
      background-position: left bottom; 
      background-size: contain; 
      z-index: 1;
      transform-origin: bottom left;
    }
    
    #frontsuper { 
      background-image: url('frontsuper.png'); 
      background-position: right bottom; 
      background-size: contain; 
      z-index: 5;
      transform-origin: bottom right;
    }

      will-change: transform, opacity;
