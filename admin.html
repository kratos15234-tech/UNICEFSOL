<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #14F195; --purple: #9945FF; --bg: #060612;
      --surface: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.08);
      --muted: rgba(255,255,255,0.4);
    }
    html, body { min-height: 100vh; overflow-y: auto; }
    body {
      font-family: 'Outfit', sans-serif;
      color: #fff;
      overflow-x: hidden;
      background: var(--bg);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 0;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(153,69,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(153,69,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none; z-index: 0;
    }
    .orb1 { position: fixed; width: 600px; height: 600px; background: radial-gradient(circle, rgba(153,69,255,0.12), transparent 70%); top: -200px; left: -200px; pointer-events: none; z-index: 0; }
    .orb2 { position: fixed; width: 400px; height: 400px; background: radial-gradient(circle, rgba(20,241,149,0.08), transparent 70%); bottom: -100px; right: -100px; pointer-events: none; z-index: 0; }

    .card {
      position: relative; z-index: 1;
      width: min(520px, 100%);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 30px 36px;
      backdrop-filter: blur(20px);
    }
    label { display: block; font-size: .7rem; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
    .divider { height: 1px; background: var(--border); margin: 20px 0; }

    .input-wrap { position: relative; margin-bottom: 10px; }
    .input-wrap .prefix { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-family: 'Bebas Neue'; font-size: 1.4rem; color: var(--green); pointer-events: none; }
    input[type="number"] {
      width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 10px; color: #fff; font-family: 'Bebas Neue'; font-size: 1.8rem;
      padding: 12px 16px 12px 38px; outline: none;
    }
    input[type="number"]:focus { border-color: var(--green); }

    .ctrl-group { border: 1px solid var(--border); padding: 12px; border-radius: 12px; margin-bottom: 12px; background: rgba(0,0,0,0.2); }
    .ctrl-group-title { color: var(--green); font-family: 'Bebas Neue'; font-size: 1.1rem; letter-spacing: 1px; margin-bottom: 8px; text-transform: uppercase; }
    .ctrl-row { display: flex; flex-direction: column; margin-bottom: 8px; }
    .ctrl-row:last-child { margin-bottom: 0; }
    .ctrl-row label { display: flex; justify-content: space-between; font-size: 0.65rem; color: #fff; letter-spacing: 1px; margin-bottom: 4px; }
    .ctrl-row label span.val { color: var(--purple); font-weight: 600; }
    .ctrl-row input[type="range"] { width: 100%; accent-color: var(--green); cursor: pointer; background: rgba(255,255,255,0.05); height: 6px; border-radius: 3px; outline: none; }

    .btn-save { width: 100%; padding: 16px; background: linear-gradient(90deg, var(--green), #0fd87f); border: none; border-radius: 10px; font-family: 'Bebas Neue'; font-size: 1.2rem; letter-spacing: 3px; color: #000; cursor: pointer; transition: opacity .2s; box-shadow: 0 0 20px rgba(20,241,149,0.2); margin-top: 10px; }
    .btn-save:hover { opacity: .9; }
    .btn-back { display: block; text-align: center; text-decoration: none; color: var(--muted); font-size: .75rem; letter-spacing: 2px; margin-top: 14px; }
    .btn-back:hover { color: #fff; }

    .toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-80px); background: var(--green); color: #000; font-family: 'Bebas Neue'; font-size: 1rem; letter-spacing: 3px; padding: 12px 28px; border-radius: 50px; box-shadow: 0 4px 30px rgba(20, 241, 149, 0.4); transition: transform .35s cubic-bezier(.4,0,.2,1); z-index: 9999; }
    .toast.show { transform: translateX(-50%) translateY(0); }

    #gate { position: fixed; inset: 0; z-index: 9998; background: var(--bg); display: flex; align-items: center; justify-content: center; }
    .gate-card { width: min(380px, 90%); background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px 36px; text-align: center; }
    .gate-card h2 { font-family: 'Bebas Neue'; font-size: 2rem; margin-bottom: 6px; }
    .gate-card p { color: var(--muted); font-size: .82rem; margin-bottom: 24px; }
    .gate-input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 10px; color: #fff; font-family: 'Outfit'; font-size: 1rem; padding: 13px 16px; outline: none; margin-bottom: 12px; text-align: center; letter-spacing: 2px; }
    .gate-input:focus { border-color: var(--green); }
    .gate-btn { width: 100%; padding: 13px; background: linear-gradient(90deg, var(--green), #0fd87f); border: none; border-radius: 10px; font-family: 'Bebas Neue'; font-size: 1.1rem; letter-spacing: 3px; color: #000; cursor: pointer; }
    .gate-error { color: #ff5050; font-size: .75rem; margin-top: 10px; }
  </style>
</head>
<body>
<div class="orb1"></div>
<div class="orb2"></div>

<div id="gate">
  <div class="gate-card">
    <h2>Admin <span style="background:linear-gradient(90deg,#14F195,#9945FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Access</span></h2>
    <p>Enter your credentials to continue</p>
    <input class="gate-input" type="text"     id="user-input" placeholder="Username" autocomplete="off" spellcheck="false">
    <input class="gate-input" type="password" id="pwd-input"  placeholder="Password" autocomplete="off">
    <button class="gate-btn" id="login-btn" onclick="checkCreds()">Login</button>
    <p class="gate-error" id="gate-error"></p>
  </div>
</div>

<div class="card">
  <label>Total Donations Raised</label>
  <div class="input-wrap">
    <span class="prefix">$</span>
    <input type="number" id="amount-input" min="0" step="0.01" placeholder="0.00">
  </div>

  <div class="divider"></div>

  <div class="ctrl-group">
    <div class="ctrl-group-title">1. Global Container Mobile</div>
    <div class="ctrl-row">
      <label><span>Container Scale:</span><span class="val" id="v-cscale">1.00</span></label>
      <input type="range" id="s-cscale" min="0.5" max="2.5" step="0.05" value="1.00" oninput="autoSaveMobileLayout()">
    </div>
    <div class="ctrl-row">
      <label><span>Container X:</span><span class="val" id="v-cx">0px</span></label>
      <input type="range" id="s-cx" min="-300" max="300" step="2" value="0" oninput="autoSaveMobileLayout()">
    </div>
    <div class="ctrl-row">
      <label><span>Container Y:</span><span class="val" id="v-cy">0px</span></label>
      <input type="range" id="s-cy" min="-300" max="500" step="2" value="0" oninput="autoSaveMobileLayout()">
    </div>
  </div>

  <div class="ctrl-group">
    <div class="ctrl-group-title">2. Individual Layers Mobile</div>
    <div class="ctrl-row">
      <label><span>Back Layer X:</span><span class="val" id="v-bx">0</span></label>
      <input type="range" id="s-bx" min="-400" max="400" step="5" value="0" oninput="autoSaveMobileLayout()">
    </div>
    <div class="ctrl-row">
      <label><span>Back Layer Y:</span><span class="val" id="v-by">0</span></label>
      <input type="range" id="s-by" min="-400" max="400" step="5" value="0" oninput="autoSaveMobileLayout()">
    </div>
    <div class="ctrl-row">
      <label><span>Front Layer X:</span><span class="val" id="v-fx">0</span></label>
      <input type="range" id="s-fx" min="-400" max="400" step="5" value="0" oninput="autoSaveMobileLayout()">
    </div>
    <div class="ctrl-row">
      <label><span>Front Layer Y:</span><span class="val" id="v-fy">0</span></label>
      <input type="range" id="s-fy" min="-400" max="400" step="5" value="0" oninput="autoSaveMobileLayout()">
    </div>
  </div>

  <button class="btn-save" onclick="saveAmountOnly()">Save Amount & Phrases</button>
  <a href="index.html" class="btn-back">← back to main site</a>
</div>

<div class="toast" id="toast">UPDATED ✓</div>

<script>
  const HASH_USER = "9db955bc5af848209fc3b60ea02de9062e68c1c76927d62077a93a4eafc690b3";
  const HASH_PASS = "8880ad4a09aae87264c42db9b095b07716152aebac743249e3beeb8f0f7bbd84";

  let currentPassword = '';
  let attempts = parseInt(sessionStorage.getItem('adm_try') || '0');
  let lockedUntil = parseInt(sessionStorage.getItem('adm_locked') || '0');
  let autoSaveTimeout;

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function checkCreds() {
    const now = Date.now();
    if (now < lockedUntil) {
      document.getElementById('gate-error').textContent = `Locked.`;
      return;
    }
    const btn = document.getElementById('login-btn');
    btn.disabled = true;

    const [hu, hp] = await Promise.all([
      sha256(document.getElementById('user-input').value),
      sha256(document.getElementById('pwd-input').value)
    ]);

    currentPassword = document.getElementById('pwd-input').value;
    
    if (hu === HASH_USER && hp === HASH_PASS) {
      document.getElementById('gate').style.display = 'none';
      init();
    } else {
      attempts++;
      sessionStorage.setItem('adm_try', attempts);
      if (attempts >= 5) {
        sessionStorage.setItem('adm_locked', Date.now() + 5 * 60 * 1000);
      }
      document.getElementById('gate-error').textContent = 'Incorrect credentials.';
      btn.disabled = false;
    }
  }

  function computeStats(amt) {
    return {
      vaccines: Math.floor(amt / 0.491),
      food:     Math.floor(amt / 2.46),
      water:    Math.floor(amt / 1.686)
    };
  }

  function buildPhrases(amt) {
    const s = computeStats(amt);
    return [
      s.vaccines.toLocaleString() + " polio vaccines",
      s.food.toLocaleString()     + " days of essential nutrition",
      s.water.toLocaleString()    + " clean water kits",
      "a second chance for thousands of children"
    ];
  }

  function autoSaveMobileLayout() {
    const cscale = parseFloat(document.getElementById('s-cscale').value);
    const cx = parseInt(document.getElementById('s-cx').value);
    const cy = parseInt(document.getElementById('s-cy').value);
    const bx = parseInt(document.getElementById('s-bx').value);
    const by = parseInt(document.getElementById('s-by').value);
    const fx = parseInt(document.getElementById('s-fx').value);
    const fy = parseInt(document.getElementById('s-fy').value);

    document.getElementById('v-cscale').innerText = cscale.toFixed(2);
    document.getElementById('v-cx').innerText = cx + "px";
    document.getElementById('v-cy').innerText = cy + "px";
    document.getElementById('v-bx').innerText = bx;
    document.getElementById('v-by').innerText = by;
    document.getElementById('v-fx').innerText = fx;
    document.getElementById('v-fy').innerText = fy;

    clearTimeout(autoSaveTimeout);
    autoSaveTimeout = setTimeout(async () => {
      try {
        await fetch('/api/update-amount', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            password: currentPassword,
            mobileLayout: { containerScale: cscale, containerX: cx, containerY: cy, backX: bx, backY: by, frontX: fx, frontY: fy }
          })
        });
        showToast();
      } catch (e) { console.error("Auto-save configuration error", e); }
    }, 400);
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show'); 
    setTimeout(() => t.classList.remove('show'), 1500);
  }

  async function saveAmountOnly() {
    const amt = parseFloat(document.getElementById('amount-input').value) || 0;
    try {
      const response = await fetch('/api/update-amount', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ newAmount: amt, password: currentPassword })
      });
      if (response.ok) {
        localStorage.setItem('unicef_phrases', JSON.stringify(buildPhrases(amt)));
        showToast();
      } else { alert("Error: Unauthorized."); }
    } catch (e) { alert("Network error."); }
  }

  async function init() {
    try {
      const res = await fetch('/api/get-amount');
      const data = await res.json();
      
      document.getElementById('amount-input').value = data.amount || 20931.49;

      if(data.mobileLayout) {
        const m = data.mobileLayout;
        document.getElementById('s-cscale').value = m.containerScale ?? 1.00;
        document.getElementById('s-cx').value = m.containerX ?? 0;
        document.getElementById('s-cy').value = m.containerY ?? 0;
        document.getElementById('s-bx').value = m.backX ?? 0;
        document.getElementById('s-by').value = m.backY ?? 0;
        document.getElementById('s-fx').value = m.frontX ?? 0;
        document.getElementById('s-fy').value = m.frontY ?? 0;

        document.getElementById('v-cscale').innerText = (m.containerScale ?? 1.00).toFixed(2);
        document.getElementById('v-cx').innerText = (m.containerX ?? 0) + "px";
        document.getElementById('v-cy').innerText = (m.containerY ?? 0) + "px";
        document.getElementById('v-bx').innerText = m.backX ?? 0;
        document.getElementById('v-by').innerText = m.backY ?? 0;
        document.getElementById('v-fx').innerText = m.frontX ?? 0;
        document.getElementById('v-fy').innerText = m.frontY ?? 0;
      }
    } catch (e) { console.error("Error loading values.", e); }
  }
</script>
</body>
</html>
